<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login — BloodLife</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <main class="auth-page">

    <div class="auth-card">

      <!-- Icon -->
      <div class="auth-icon">🔐</div>

      <h1 class="auth-title">Admin Access</h1>
      <p class="auth-subtitle">Sign in to the admin dashboard</p>

      <!-- Form -->
      <form id="login-form" novalidate>

        <div class="form-group">
          <label class="form-label" for="username">👤 Username</label>
          <input class="form-input" type="text" id="username" required placeholder="Enter admin username" autocomplete="username">
        </div>

        <div class="form-group">
          <label class="form-label" for="password">🔒 Password</label>
          <input class="form-input" type="password" id="password" required placeholder="Enter admin password" autocomplete="current-password">
        </div>

        <button type="submit" class="btn-primary btn-full" style="margin-top:.25rem;">Sign In</button>
      </form>

      <!-- Error message (shown by auth.js) -->
      <p id="error-msg">Invalid credentials</p>

      <div class="auth-links" style="margin-top:1.25rem;">
        <p><a href="index.html">← Back to Home</a></p>
      </div>

    </div><!-- /.auth-card -->

  </main>

  <script src="js/auth.js"></script>
</body>
</html>
