<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Donor Login — BloodLife</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <main class="auth-page">

    <div class="auth-card">

      <!-- Icon -->
      <div class="auth-icon">🩸</div>

      <h1 class="auth-title">Donor Login</h1>
      <p class="auth-subtitle">Access your donor dashboard</p>

      <!-- Alert -->
      <div id="alert" class="alert"></div>

      <!-- Form -->
      <form id="login-form" novalidate>

        <div class="form-group">
          <label class="form-label" for="email">✉️ Email Address</label>
          <input class="form-input" type="email" id="email" required placeholder="your.email@example.com" autocomplete="email">
        </div>

        <div class="form-group">
          <label class="form-label" for="password">🔒 Password</label>
          <input class="form-input" type="password" id="password" required placeholder="Enter your password" autocomplete="current-password">
        </div>

        <button type="submit" class="btn-primary btn-full" style="margin-top:.25rem;">Login</button>
      </form>

      <div class="divider">OR</div>

      <div class="auth-links">
        <p>Don't have an account? <a href="donor-register-account.html">Create Account</a></p>
        <p><a href="register.html">Register as New Donor</a></p>
        <p style="margin-top:1rem;"><a href="index.html">← Back to Home</a></p>
      </div>

    </div><!-- /.auth-card -->

  </main>

  <script>
    const API_BASE = 'http://localhost:5000/api';

    document.getElementById('login-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const alert = document.getElementById('alert');

        try {
            const response = await fetch(`${API_BASE}/donor-auth/login`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ email, password })
            });

            const data = await response.json();

            if (data.success) {
                // Store token and donor info
                localStorage.setItem('donor_token', data.token);
                localStorage.setItem('donor_info', JSON.stringify(data.donor));

                alert.className = 'alert alert-success';
                alert.textContent = 'Login successful! Redirecting...';
                alert.style.display = 'block';

                setTimeout(() => {
                    window.location.href = 'donor-dashboard.html';
                }, 1000);
            } else {
                alert.className = 'alert alert-error';
                alert.textContent = data.message || 'Login failed';
                alert.style.display = 'block';
            }
        } catch (error) {
            alert.className = 'alert alert-error';
            alert.textContent = 'Network error. Please try again.';
            alert.style.display = 'block';
        }
    });
  </script>
</body>
</html>
